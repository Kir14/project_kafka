version: '3'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: pizza_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  airflow-webserver:
    build: .  # This looks for the Dockerfile in the current folder
    # image: apache/airflow:2.8.1
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:pass123@postgres/pizza_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 0
      AIRFLOW__CORE__FERNET_KEY: P5I6X6l7c-l-zYoKdmcn6EL_Zg_tLO-tWcau2hn0OdU=
      AIRFLOW__WEBSERVER__SECRET_KEY: secret_key_web_server
    depends_on:
      - postgres

  airflow-scheduler:
    image: apache/airflow:2.8.1
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:pass123@postgres/pizza_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: P5I6X6l7c-l-zYoKdmcn6EL_Zg_tLO-tWcau2hn0OdU=
      AIRFLOW__WEBSERVER__SECRET_KEY: secret_key_web_server
    depends_on:
      - postgres

  airflow-init:
    image: apache/airflow:2.8.1
    command: version
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:pass123@postgres/pizza_db
    entrypoint: /bin/bash
    # This initializes the DB and creates your admin user
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname Kirill --lastname Project --role Admin --email admin@example.com"
    depends_on:
      - postgres

volumes:
  postgres_data: